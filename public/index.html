<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki Design Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@400;700;900&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&family=Amiri:wght@400;700&family=Montserrat:wght@400;600;700;800&family=Roboto:wght@400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--s1:#1a1a2e;--s2:#252540;--s3:#353555;--bd:#2a2a45;--tx:#e8e8f0;--tx2:#8888aa;--tx3:#555577;--ac:#7c3aed;--ac2:#a78bfa;--gn:#22c55e;--rd:#ef4444;--r:12px}
body{font-family:'Inter','Noto Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.hdr{text-align:center;padding:20px 16px 4px}
.hdr h1{font-size:1.6em;font-weight:900;background:linear-gradient(135deg,#a78bfa,#7c3aed,#c084fc);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 4s ease infinite}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr p{color:var(--tx2);font-size:.72em;margin-top:2px}
.tabs{display:flex;justify-content:center;gap:2px;margin:8px auto 12px;background:var(--s1);border-radius:10px;padding:3px;width:fit-content;border:1px solid var(--bd);flex-wrap:wrap}
.tab{padding:6px 12px;border:none;background:none;color:var(--tx2);border-radius:8px;cursor:pointer;font-size:.72em;font-weight:600;transition:all .2s;font-family:inherit}
.tab:hover{color:var(--tx);background:var(--s2)}.tab.on{color:#fff;background:var(--ac)}
.sec{display:none;padding:0 12px 30px;max-width:1400px;margin:0 auto}.sec.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.gc{background:var(--s1);border:2px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .25s;overflow:hidden;position:relative}
.gc:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 6px 20px rgba(124,58,237,.15)}
.gc.sel{border-color:var(--gn);box-shadow:0 0 16px rgba(34,197,94,.2)}
.gc.sel::after{content:'\2713';position:absolute;top:5px;left:5px;background:var(--gn);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;z-index:5}
.gp{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;overflow:hidden}
.gnm{padding:5px 8px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.gnm span{font-weight:700;font-size:.68em}.gc-cat{font-size:.48em;padding:2px 5px;border-radius:4px;background:var(--s2);color:var(--tx2)}
.filt{display:flex;justify-content:center;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.fb{padding:3px 9px;border:1px solid var(--bd);border-radius:10px;background:var(--s1);color:var(--tx2);font-size:.62em;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.fb:hover{border-color:var(--ac);color:var(--ac2)}.fb.on{border-color:var(--ac);background:rgba(124,58,237,.12);color:var(--ac2)}
.cl{display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start}
.cs{max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
.cs::-webkit-scrollbar{width:3px}.cs::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.cp{position:sticky;top:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.cp-t{font-size:.8em;font-weight:800;color:var(--ac2);text-align:center}
.cp-c{width:100%;max-width:360px;border-radius:var(--r);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--bd);background:var(--s1)}
@media(max-width:800px){.cl{grid-template-columns:1fr}.cp{position:static}}
.cw{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:8px}
.cs-t{margin:10px 0 6px;font-size:.72em;font-weight:800;color:var(--ac2);padding-bottom:3px;border-bottom:1px solid var(--bd)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.ct{display:flex;flex-direction:column;gap:2px;padding:4px 0}
.cl-b{font-size:.6em;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px}
.rw{display:flex;align-items:center;gap:5px}
.rv{font-size:.62em;color:var(--ac2);min-width:30px;text-align:center;font-weight:600}
input[type=range]{flex:1;accent-color:var(--ac);height:3px}
input[type=color]{width:28px;height:24px;border:1px solid var(--bd);border-radius:5px;cursor:pointer;background:none;padding:1px}
.tx,.sl,.hx{padding:4px 7px;border:1px solid var(--bd);border-radius:5px;background:var(--s2);color:var(--tx);font-size:.7em;font-family:inherit;width:100%}
select.sl{appearance:none;cursor:pointer}
.si{display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--s2);border-radius:5px;margin-bottom:3px;font-size:.68em;cursor:grab;border:1px solid transparent;transition:all .2s}
.si:hover{border-color:var(--ac)}
.si-n{background:var(--ac);color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55em;font-weight:700}
.btn{padding:6px 12px;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:.72em;font-family:inherit;transition:all .2s}
.ba{background:linear-gradient(135deg,var(--ac),#6d28d9);color:#fff}
.bo{border:1px solid var(--bd);background:none;color:var(--tx2)}.bo:hover{border-color:var(--ac);color:var(--tx)}
.br{border:1px solid var(--rd);background:none;color:var(--rd)}
.bg{border:1px solid var(--gn);background:none;color:var(--gn)}
.bs{padding:3px 8px;font-size:.64em;border-radius:5px}
.ve-l{display:grid;grid-template-columns:1fr 220px;gap:10px;align-items:start}
.ve-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px}
.ve-p{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px}
@media(max-width:800px){.ve-l{grid-template-columns:1fr}}
.dl-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;max-width:450px;margin:0 auto}
.dl-c h3{font-size:.85em;font-weight:800;color:var(--ac2);margin-bottom:6px}
.tt-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;max-width:500px;margin:0 auto}
.tt-c h3{font-size:.82em;font-weight:800;color:var(--ac2);margin-bottom:6px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gn);color:#fff;padding:7px 16px;border-radius:8px;font-weight:700;font-size:.74em;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-3px)}
.sw{width:32px;height:32px;border-radius:6px;border:2px solid var(--bd);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.sw:hover{transform:scale(1.1);border-color:var(--ac)}
.fsw{position:relative;display:flex;justify-content:center;align-items:center;min-height:400px;background:var(--s1);border-radius:var(--r);overflow:hidden}
.fsc{max-width:380px;width:88%}
.fsn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--ac);color:#fff;border:none;cursor:pointer;font-size:.9em;display:flex;align-items:center;justify-content:center;z-index:5}
.fsn:hover{background:var(--ac2)}
.fsn.p{right:8px}.fsn.n{left:8px}
.fsi{text-align:center;padding:8px;font-size:.7em;color:var(--tx2);font-weight:600}
.fsc2{text-align:center;font-size:.62em;color:var(--tx3);padding:3px}

/* VE element selection */
[data-ve]{cursor:pointer;border:2px dashed transparent;border-radius:5px;transition:all .15s}
[data-ve]:hover{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.03)}
[data-ve].ve-sel{border-color:var(--gn)!important;border-style:solid!important;background:rgba(34,197,94,.05)!important}
</style>
</head>
<body>
<div class="hdr"><h1>Anki Design Studio</h1><p>صمّم بطاقاتك بأسلوبك</p></div>
<div class="tabs">
<button class="tab on" data-t="gal">المعرض</button>
<button class="tab" data-t="ctl">التحكم</button>
<button class="tab" data-t="editor">المحرر البصري</button>
<button class="tab" data-t="full">معاينة كاملة</button>
<button class="tab" data-t="tts">النطق</button>
<button class="tab" data-t="dl">التنزيل</button>
</div>

<div id="sec-gal" class="sec on"><div class="filt" id="filtBar"></div><div class="gal-grid" id="tplGrid"></div></div>

<div id="sec-ctl" class="sec">
<div class="cl">
<div class="cs">
<div style="display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap">
<button class="btn bo bs" onclick="undo()" id="undoBtn" disabled>↩ تراجع</button>
<button class="btn bo bs" onclick="redo()" id="redoBtn" disabled>↪ إعادة</button>
<button class="btn bo bs" onclick="randomDesign()">🎲 عشوائي</button>
<button class="btn bo bs" onclick="resetDesign()">🔄 ضبط</button>
<button class="btn bo bs" onclick="saveCustom()">💾 حفظ</button>
</div>
<div id="ctrlArea" class="cw"></div>
</div>
<div class="cp"><div class="cp-t">معاينة مباشرة</div><div class="cp-c" id="ctlPreviewCard"></div></div>
</div>
</div>

<div id="sec-editor" class="sec">
<div class="ve-l">
<div class="ve-c" id="veCanvas"></div>
<div class="ve-p" id="veProps">
<div style="font-size:.72em;font-weight:800;color:var(--ac2);margin-bottom:6px">خصائص العنصر</div>
<div id="vePropPanel" style="font-size:.65em;color:var(--tx2)">اضغط على عنصر بالبطاقة</div>
</div>
</div>
</div>

<div id="sec-full" class="sec">
<div class="fsw">
<button class="fsn p" onclick="prevTpl()">\u25B6</button>
<button class="fsn n" onclick="nextTpl()">\u25C0</button>
<div class="fsc" id="fsCard"></div>
</div>
<div class="fsi" id="fsInfo"></div>
<div class="fsc2" id="fsCounter"></div>
</div>

<div id="sec-tts" class="sec">
<div class="tt-c">
<h3>النطق</h3>
<p style="font-size:.68em;color:var(--tx2);margin-bottom:8px">صوت رجل — يُسمع تلقائياً عند فتح البطاقة</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
<div style="display:flex;flex-direction:column;gap:2px">
<span style="font-size:.6em;color:var(--tx2)">السرعة</span>
<div class="rw"><input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="0.8"><span class="rv" id="ttsRateVal">0.8x</span></div>
</div>
<div style="display:flex;flex-direction:column;gap:2px">
<span style="font-size:.6em;color:var(--tx2)">النغمة</span>
<div class="rw"><input type="range" id="ttsPitch" min="0.5" max="2" step="0.1" value="0.7"><span class="rv" id="ttsPitchVal">1.0</span></div>
</div>
</div>
<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
<button class="btn ba bs" onclick="speakWord(SAMP.f,'fr')">\uD83D\uDD0A فرنسي</button>
<button class="btn ba bs" onclick="speakWord(SAMP.a,'ar')">\uD83D\uDD0A عربي</button>
</div>
</div>
</div>

<div id="sec-dl" class="sec">
<div class="dl-c">
<h3>تنزيل رزمة Anki</h3>
<p style="font-size:.68em;color:var(--tx2);margin-bottom:10px">ملف .apkg جاهز للاستيراد</p>
<div style="margin-bottom:10px">
<label style="font-size:.68em;color:var(--tx2);display:block;margin-bottom:3px">اسم الرزمة</label>
<input class="tx" id="deckName" value="Fran\u00e7ais Bac 2021-2022" style="text-align:center;font-weight:700">
</div>
<button class="btn ba" style="width:100%;padding:10px" onclick="downloadAPKG()">\u2B07\uFE0F تنزيل .apkg</button>
<div id="dlInfo" style="margin-top:8px;font-size:.68em;color:var(--tx2);text-align:center"></div>
<div id="loading" style="display:none;margin-top:8px;text-align:center"><span style="font-size:.68em;color:var(--tx2)">جاري التوليد...</span></div>
</div>
<div class="cw" style="margin-top:10px;max-width:450px;margin-left:auto;margin-right:auto">
<div style="font-size:.72em;font-weight:800;color:var(--ac2);margin-bottom:6px">نسخ احتياطي</div>
<div style="display:flex;gap:6px">
<button class="btn bo bs" onclick="exportConfig()">تصدير الإعدادات</button>
<label class="btn bo bs" style="cursor:pointer">استيراد الإعدادات<input type="file" accept=".json" onchange="importConfig(event)" style="display:none"></label>
</div>
</div>
</div>

<div id="toast"></div>

<script>
const SAMP={f:'Maison',a:'منزل',p:'Maisons',s:'Contrat',c:'Désabonnement'};
const FMAP={"Inter":"'Inter',sans-serif","Noto Sans Arabic":"'Noto Sans Arabic',sans-serif","Poppins":"'Poppins',sans-serif","Playfair Display":"'Playfair Display',serif","Cairo":"'Cairo',sans-serif","Tajawal":"'Tajawal',sans-serif","Amiri":"'Amiri',serif","System":"system-ui,sans-serif"};










const FONTS=[
{v:"Inter",l:"Inter"},{v:"Poppins",l:"Poppins"},{v:"Playfair Display",l:"Playfair Display"},
{v:"Cairo",l:"Cairo"},{v:"Tajawal",l:"Tajawal"},{v:"Amiri",l:"Amiri"},
{v:"System",l:"System Default"}
];

const ARFONTS=[
{v:"Noto Sans Arabic",l:"Noto Sans Arabic"},{v:"Cairo",l:"Cairo"},
{v:"Tajawal",l:"Tajawal"},{v:"Amiri",l:"Amiri"},{v:"System",l:"System Default"}
];

// ============================================================
// TEMPLATES DEFINITIONS
// ============================================================
const CATS={all:'الكل',classic:'كلاسيكي',modern:'عصري',colorful:'ملون',elegant:'أنيق',minimal:'بسيط',bold:'جريء',creative:'إبداعي',french:'فرنسي',arabic:'عربي'};


// Default config for each template
function defCfg(overrides={}){
  return Object.assign({
    cardBg:'#ffffff',cardBg2:'',bgGradientDir:'135deg',
    cardBgImage:'',cardBgOpacity:1,cardBgBlur:0,
    borderRadius:16,cardPadding:28,cardMinHeight:300,
    cardBorderWidth:0,cardBorderColor:'#e2e8f0',
    cardShadow:'none',cardDirection:'column',cardAlign:'center',cardGap:10,
    frenchColor:'#1e293b',frenchFontSize:2.4,frenchFontWeight:900,
    frenchLetterSpacing:0,frenchLineHeight:1.2,
    meaningColor:'#1e40af',meaningFontSize:1.5,meaningFontWeight:800,
    meaningBg:'#eff6ff',meaningBorder:'#bfdbfe',meaningBorderRadius:16,meaningBorderWidth:2,
    badgeNomBg:'#dbeafe',badgeNomColor:'#1e40af',
    badgeAdjBg:'#fef3c7',badgeAdjColor:'#92400e',
    badgeVerbBg:'#d1fae5',badgeVerbColor:'#065f46',
    unitBg:'#f0fdf4',unitColor:'#166534',unitBorder:'#bbf7d0',
    secBg:'#f8f9fa',secBorder:'#e2e8f0',secTextColor:'#333',labelColor:'#999',
    effect:'none',showBadge:true,showUnitBadge:true,showMeaning:true,showPage:true,
    sectionOrder:['Pluriel','Synonyme','Contraire'],sectionVisibility:{Pluriel:true,Synonyme:true,Contraire:true},
    separatorStyle:'none',separatorWidth:2,separatorColor:'#e2e8f0',
    frenchTextShadow:'',meaningTextShadow:'',
    fontFrench:'Inter',fontArabic:'Noto Sans Arabic',
    speakerIcon:'🔊',speakerBg:'rgba(124,58,237,.15)',speakerColor:'#7c3aed',
    deckName:'📘 Français Bac 2021-2022'
  },overrides);
}

// Template definitions -- each has a default config and visual preview
const TEMPLATES=[
// ===== CLASSIC =====
{id:'classic-1',nm:'كلاسيكي بسيط',en:'Classic Simple',cat:'classic',
cfg:defCfg({cardBg:'#ffffff',frenchColor:'#1e293b',meaningColor:'#1e40af',meaningBg:'#eff6ff',borderRadius:16,cardShadow:'0 4px 16px rgba(0,0,0,.1)'})},
{id:'classic-2',nm:'كلاسيكي داكن',en:'Classic Dark',cat:'classic',
cfg:defCfg({cardBg:'#1a1a2e',cardBg2:'#16213e',frenchColor:'#e2e8f0',meaningColor:'#818cf8',meaningBg:'rgba(99,102,241,.1)',meaningBorder:'rgba(99,102,241,.3)',labelColor:'#666',secBg:'rgba(255,255,255,.05)',secBorder:'rgba(255,255,255,.1)',secTextColor:'#ccc',borderRadius:16,cardShadow:'0 8px 32px rgba(0,0,0,.4)'})},
{id:'classic-3',nm:'كلاسيكي ذهبي',en:'Classic Gold',cat:'classic',
cfg:defCfg({cardBg:'#fffbeb',cardBg2:'#fef3c7',frenchColor:'#92400e',meaningColor:'#b45309',meaningBg:'rgba(245,158,11,.1)',meaningBorder:'#fbbf24',badgeNomBg:'#fbbf24',badgeNomColor:'#92400e',borderRadius:16,cardShadow:'0 4px 20px rgba(245,158,11,.15)'})},

// ===== MODERN =====
{id:'modern-1',nm:'عصري أزرق',en:'Modern Blue',cat:'modern',
cfg:defCfg({cardBg:'#0f172a',cardBg2:'#1e293b',frenchColor:'#38bdf8',meaningColor:'#94a3b8',meaningBg:'rgba(56,189,248,.08)',meaningBorder:'rgba(56,189,248,.2)',badgeNomBg:'rgba(56,189,248,.15)',badgeNomColor:'#38bdf8',borderRadius:12,cardShadow:'0 8px 32px rgba(0,0,0,.5)',effect:'glow'})},
{id:'modern-2',nm:'عصري بنفسجي',en:'Modern Purple',cat:'modern',
cfg:defCfg({cardBg:'#1e1b4b',cardBg2:'#312e81',frenchColor:'#c4b5fd',meaningColor:'#a78bfa',meaningBg:'rgba(167,139,250,.08)',meaningBorder:'rgba(167,139,250,.2)',badgeNomBg:'rgba(167,139,250,.15)',badgeNomColor:'#c4b5fd',borderRadius:16,cardShadow:'0 8px 32px rgba(0,0,0,.5)'})},
{id:'modern-3',nm:'عصري أخضر',en:'Modern Green',cat:'modern',
cfg:defCfg({cardBg:'#022c22',cardBg2:'#064e3b',frenchColor:'#6ee7b7',meaningColor:'#a7f3d0',meaningBg:'rgba(110,231,183,.08)',meaningBorder:'rgba(110,231,183,.2)',badgeNomBg:'rgba(110,231,183,.15)',badgeNomColor:'#6ee7b7',borderRadius:12,cardShadow:'0 8px 32px rgba(0,0,0,.5)'})},

// ===== COLORFUL =====
{id:'color-1',nm:'pectrum',en:'Rainbow Spectrum',cat:'colorful',
cfg:defCfg({cardBg:'#ff6b6b',cardBg2:'#4ecdc4',bgGradientDir:'135deg',frenchColor:'#ffffff',meaningColor:'#ffffff',meaningBg:'rgba(255,255,255,.2)',meaningBorder:'rgba(255,255,255,.4)',badgeNomBg:'rgba(255,255,255,.25)',badgeNomColor:'#fff',borderRadius:20,cardShadow:'0 8px 32px rgba(255,107,107,.3)',effect:'wave'})},
{id:'color-2',nm:' sunset',en:'Sunset Vibes',cat:'colorful',
cfg:defCfg({cardBg:'#f093fb',cardBg2:'#f5576c',bgGradientDir:'135deg',frenchColor:'#ffffff',meaningColor:'#ffffff',meaningBg:'rgba(255,255,255,.2)',meaningBorder:'rgba(255,255,255,.3)',borderRadius:20,cardShadow:'0 8px 32px rgba(240,147,251,.3)',effect:'float'})},
{id:'color-3',nm:'ocean',en:'Ocean Breeze',cat:'colorful',

{id:'color-4',nm:'forest',en:'Forest Walk',cat:'colorful',
cfg:defCfg({cardBg:'#43e97b',cardBg2:'#38f9d7',bgGradientDir:'135deg',frenchColor:'#ffffff',meaningColor:'#ffffff',meaningBg:'rgba(255,255,255,.2)',meaningBorder:'rgba(255,255,255,.3)',borderRadius:20,cardShadow:'0 8px 32px rgba(67,233,123,.3)'})},

// ===== ELEGANT =====
{id:'elegant-1',nm:'أنيق رمادي',en:'Elegant Gray',cat:'elegant',
cfg:defCfg({cardBg:'#f8f9fa',cardBg2:'#e9ecef',frenchColor:'#212529',meaningColor:'#495057',meaningBg:'#ffffff',meaningBorder:'#dee2e6',meaningBorderRadius:8,meaningBorderWidth:1,badgeNomBg:'#e9ecef',badgeNomColor:'#495057',borderRadius:8,cardBorderWidth:1,cardBorderColor:'#dee2e6',cardShadow:'none',cardGap:8})},

// STATE
let S={...defCfg()};let hist=[JSON.parse(JSON.stringify(S))];let histIdx=0;let curTplIdx=0;let curCat='all';let selectedVEEl=null;
function pushHist(){hist=hist.slice(0,histIdx+1);hist.push(JSON.parse(JSON.stringify(S)));histIdx=hist.length-1;updateUndoRedo();}
function undo(){if(histIdx>0){histIdx--;S=JSON.parse(JSON.stringify(hist[histIdx]));renderAll();}}
function redo(){if(histIdx<hist.length-1){histIdx++;S=JSON.parse(JSON.stringify(hist[histIdx]));renderAll();}}
function updateUndoRedo(){const u=document.getElementById('undoBtn');if(u)u.disabled=histIdx<=0;const r=document.getElementById('redoBtn');if(r)r.disabled=histIdx>=hist.length-1;}
function setVal(k,v){S[k]=v;pushHist();renderAll();}
function renderAll(){renderGrid();updateCtlPreview();syncToggles();if(document.getElementById('sec-editor').classList.contains('on'))renderVE();if(document.getElementById('sec-full').classList.contains('on'))renderFullscreen();}

// NAVIGATION
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));this.classList.add('on');
  document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));
  document.getElementById('sec-'+this.dataset.t).classList.add('on');
  if(this.dataset.t==='ctl')renderCtrls();
  if(this.dataset.t==='editor')renderVE();
  if(this.dataset.t==='full')renderFullscreen();
}));
function syncToggles(){document.querySelectorAll("[data-tog]").forEach(function(el){var k=el.getAttribute("data-tog");if(k.startsWith("sec-"))return;var v=S[k]!==false;el.className="btn "+(v?"bg":"br")+" bs";el.textContent=(v?"✓":"✗")+" "+el.getAttribute("data-lbl");});}
function syncSectionToggles(){document.querySelectorAll("[data-tog^=\"sec-\"]").forEach(function(el){var k=el.getAttribute("data-tog").replace("sec-","");var vis=(S.sectionVisibility||{Pluriel:true,Synonyme:true,Contraire:true})[k]!==false;el.className="btn "+(vis?"bg":"br")+" bs";el.textContent=(vis?"✓":"✗")+" "+el.getAttribute("data-lbl");});}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='show';setTimeout(()=>t.className='',2000);}

// GALLERY
function getFilteredTemplates(){return curCat==='all'?TEMPLATES:TEMPLATES.filter(t=>t.cat===curCat);}
function renderGrid(){
  const f=getFilteredTemplates();
  document.getElementById('tplGrid').innerHTML=f.map(t=>{
    const sel=S._templateId===t.id;
    const bg=t.cfg.cardBg2?'linear-gradient(135deg,'+t.cfg.cardBg+','+t.cfg.cardBg2+')':t.cfg.cardBg;
    const ff=FMAP[t.cfg.fontFrench]||"'Inter',sans-serif";
    const fa=FMAP[t.cfg.fontArabic]||"'Noto Sans Arabic',sans-serif";
    return '<div class="gc'+(sel?' sel':'')+'" onclick="selectTemplate(\''+t.id+'\')"><div class="gp" style="background:'+bg+';border-radius:'+t.cfg.borderRadius+'px"><div style="font-family:'+ff+';font-size:1.2em;font-weight:'+t.cfg.frenchFontWeight+';color:'+t.cfg.frenchColor+';margin-bottom:2px">'+SAMP.f+'</div><div style="font-family:'+fa+';font-size:.75em;font-weight:'+t.cfg.meaningFontWeight+';color:'+t.cfg.meaningColor+'">'+SAMP.a+'</div></div><div class="gnm"><span>'+t.nm+'</span><span class="gc-cat">'+(CATS[t.cat]||t.cat)+'</span></div></div>';
  }).join('');
}
function renderFilt(){document.getElementById('filtBar').innerHTML=Object.entries(CATS).map(([k,v])=>'<button class="fb'+(k===curCat?' on':'')+'" onclick="setCat(\''+k+'\')">'+v+'</button>').join('');}
function setCat(c){curCat=c;renderFilt();renderGrid();}
function selectTemplate(id){const t=TEMPLATES.find(x=>x.id===id);if(!t)return;S={...JSON.parse(JSON.stringify(t.cfg)),_templateId:id};pushHist();renderGrid();toast('تم اختيار: '+t.nm);}

// RENDER CARD HTML
function renderCardHTML(c){
  const fF=FMAP[c.fontFrench]||"'Inter',sans-serif";
  const fA=FMAP[c.fontArabic]||"'Noto Sans Arabic',sans-serif";
  const br=c.borderRadius||16,pd=c.cardPadding||28,mh=c.cardMinHeight||300,mw=c.cardMaxWidth||480,cg=c.cardGap||10;
  const fsFr=c.frenchFontSize||2.4,fwFr=c.frenchFontWeight||900,fc=c.frenchColor||'#1e293b';
  const fsAr=c.meaningFontSize||1.5,fwAr=c.meaningFontWeight||800,mc=c.meaningColor||'#1e40af';
  let bg=c.cardBg;
  if(c.cardBg2&&c.cardBg!==c.cardBg2)bg='linear-gradient('+(c.bgGradientDir||'135deg')+','+c.cardBg+','+c.cardBg2+')';
  // Background image overlay (separate from card content)
  const bgOverlay=c.cardBgImage?'<div style="position:absolute;inset:0;background-image:url('+c.cardBgImage+');background-size:cover;background-position:center;filter:blur('+(c.cardBgBlur||0)+'px);opacity:'+(c.cardBgOpacity!==undefined?c.cardBgOpacity:1)+';z-index:0;pointer-events:none"></div>':'';
  const extras=(c.cardBorderWidth>0?'border:'+c.cardBorderWidth+'px solid '+c.cardBorderColor+';':'')+(c.cardShadow&&c.cardShadow!=='none'?'box-shadow:'+c.cardShadow+';':'');
  const base='border-radius:'+br+'px;text-align:center;position:relative;overflow:hidden;font-family:'+fA+',sans-serif;direction:rtl;';
  const fOp=c.frenchOpacity!==undefined?c.frenchOpacity:1;
  const mOp=c.meaningOpacity!==undefined?c.meaningOpacity:1;
  const bOp=c.badgeOpacity!==undefined?c.badgeOpacity:1;
  const sOp=c.sectionOpacity!==undefined?c.sectionOpacity:1;
  const fW=(c.frenchWidth||100)+'%';const mW=(c.meaningWidth||90)+'%';
  const fSc=c.frenchScale||1;const mSc=c.meaningScale||1;
  const fMt=c.frenchMarginTop||0;const fMb=c.frenchMarginBottom||4;

  const french='<div style="opacity:'+fOp+';width:'+fW+';transform:scale('+fSc+');margin-top:'+fMt+'px;margin-bottom:'+fMb+'px;font-family:'+fF+',sans-serif;font-size:'+fsFr+'em;font-weight:'+fwFr+';direction:ltr;unicode-bidi:embed;color:'+fc+';letter-spacing:'+(c.frenchLetterSpacing||0)+'px;line-height:'+(c.frenchLineHeight||1.2)+'">'+SAMP.f+'</div>';
  const meaning=c.showMeaning!==false?'<div style="opacity:'+mOp+';width:'+mW+';transform:scale('+mSc+');margin-top:'+mMt+'px;margin-bottom:'+mMb+'px;background:'+(c.meaningBg||'#eff6ff')+';border:'+(c.meaningBorderWidth||2)+'px solid '+(c.meaningBorder||'#bfdbfe')+';border-radius:'+(c.meaningBorderRadius||16)+'px;padding:10px 16px"><div style="font-family:'+fA+',sans-serif;font-size:'+fsAr+'em;font-weight:'+fwAr+';color:'+mc+'">'+SAMP.a+'</div></div>':'';

function toggleSection(s){if(!S.sectionVisibility)S.sectionVisibility={Pluriel:true,Synonyme:true,Contraire:true};S.sectionVisibility[s]=!S.sectionVisibility[s];pushHist();renderAll();syncSectionToggles();}
function updateCtlPreview(){const e=document.getElementById('ctlPreviewCard');if(e)e.innerHTML=renderCardHTML(S);}



// PRESETS
function applyColorPreset(i){const p=PRESETS.colors[i];if(!p)return;S.cardBg=p.bg;S.frenchColor=p.fc;S.meaningColor=p.mc;S.meaningBg=p.mb;S.meaningBorder=p.mbd;pushHist();renderCtrls();renderAll();}
function applyStylePreset(i){const p=PRESETS.styles[i];if(!p)return;S.borderRadius=p.br;S.cardPadding=p.pd;S.cardShadow=p.sh;S.cardBorderWidth=p.bw;S.cardDirection=p.dir;S.cardAlign=p.al;S.cardGap=p.gap;pushHist();renderCtrls();renderAll();}
function applyTextPreset(i){const p=PRESETS.texts[i];if(!p)return;S.frenchFontSize=p.fsFr;S.frenchFontWeight=p.fwFr;S.meaningFontSize=p.fsAr;S.meaningFontWeight=p.fwAr;pushHist();renderCtrls();renderAll();}
function applyFontPreset(i){const p=PRESETS.fonts[i];if(!p)return;S.fontFrench=p.fr;S.fontArabic=p.ar;pushHist();renderCtrls();renderAll();}
function randomDesign(){const t=TEMPLATES[Math.floor(Math.random()*TEMPLATES.length)];S={...JSON.parse(JSON.stringify(t.cfg)),_templateId:t.id};pushHist();renderAll();toast(t.nm);}
function resetDesign(){S={...defCfg()};pushHist();renderAll();toast('تم إعادة الضبط');}
function applyQuickDesign(i){QUICK_DESIGNS[i].apply();S._templateId='quick-'+i;pushHist();renderAll();toast(QUICK_DESIGNS[i].n);}

// TEMPLATE MANAGEMENT
function saveCustom(){const n=prompt('اسم القالب:');if(!n)return;const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');s.push({name:n,cfg:{...S},date:Date.now()});localStorage.setItem('anki_custom',JSON.stringify(s));toast('تم الحفظ: '+n);renderSavedList();}
function loadCustom(i){const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');if(!s[i])return;S={...s[i].cfg};pushHist();renderAll();toast(s[i].name);}
function deleteCustom(i){const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');s.splice(i,1);localStorage.setItem('anki_custom',JSON.stringify(s));renderSavedList();toast('تم الحذف');}
function renderSavedList(){const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');const e=document.getElementById('savedTplList');if(!e)return;if(!s.length){e.innerHTML='<div style="font-size:.65em;color:var(--tx3)">لا يوجد</div>';return;}e.innerHTML=s.map((x,i)=>'<div style="display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--s2);border-radius:5px;margin-bottom:3px;font-size:.68em"><span style="flex:1;font-weight:600">'+x.name+'</span><button class="btn bo bs" onclick="loadCustom('+i+')">تحميل</button><button class="btn br bs" onclick="deleteCustom('+i+')">حذف</button></div>').join('');}

// EXPORT / IMPORT
function exportConfig(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='anki-design.json';a.click();toast('تم التصدير');}
function importConfig(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{S=JSON.parse(ev.target.result);pushHist();renderAll();toast('تم الاستيراد');}catch(err){toast('ملف غير صحيح');}};r.readAsText(f);}

// FULLSCREEN PREVIEW
function renderFullscreen(){const t=getFilteredTemplates()[curTplIdx]||TEMPLATES[0];const c=document.getElementById('fsCard');const i=document.getElementById('fsInfo');const n=document.getElementById('fsCounter');if(c)c.innerHTML=renderCardHTML(t.cfg);if(i)i.textContent=t.nm+' — '+t.en;if(n)n.textContent=(curTplIdx+1)+' / '+getFilteredTemplates().length;}
function nextTpl(){const t=getFilteredTemplates();curTplIdx=(curTplIdx+1)%t.length;renderFullscreen();}
function prevTpl(){const t=getFilteredTemplates();curTplIdx=(curTplIdx-1+t.length)%t.length;renderFullscreen();}

// BACKGROUND IMAGE UPLOAD
function uploadBG(e){

}

function renderVE(){
  const cv=document.getElementById('veCanvas');if(!cv)return;
  cv.innerHTML=renderCardHTML(S);
  const card=cv.querySelector('.card');if(!card)return;
  // Click on card = select card
  card.addEventListener('click',(e)=>{
    if(e.target.closest('[data-ve]')&&e.target.closest('[data-ve]')!==card)return;
    card.querySelectorAll('.ve-sel').forEach(el=>el.classList.remove('ve-sel'));
    card.classList.add('ve-sel');
    selectedVEEl='card';renderVEProps('card');
  });
  // Click on any [data-ve] element
  card.querySelectorAll('[data-ve]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      card.querySelectorAll('.ve-sel').forEach(x=>x.classList.remove('ve-sel'));
      el.classList.add('ve-sel');
      const veId=el.dataset.ve;
      selectedVEEl=veId;renderVEProps(veId);
    });
  });
}

function updateVEPreview(){if(document.getElementById('sec-editor').classList.contains('on'))renderVE();}

function renderVEProps(elId){
  const p=document.getElementById('vePropPanel');if(!p)return;
  const props=VE_PROPS[elId]||[];
  let h='<div style="font-size:.78em;font-weight:700;color:var(--tx);margin-bottom:6px">'+(VE_LABELS[elId]||elId)+'</div>';
  props.forEach(pr=>{
    const v=S[pr.id]!==undefined?S[pr.id]:(pr.type==='range'?0.5:pr.type==='toggle'?true:'#000000');
    if(pr.type==='color'){
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><input type="color" value="'+v+'" oninput="setVal(\''+pr.id+'\',this.value)"><span class="rv" style="font-size:.55em">'+v+'</span></div></div>';
    }else if(pr.type==='range'){
      const fmt=pr.fmt||(vv=>vv);
      const fmtStr=pr.fmt?pr.fmt.toString():'(x=>x)';
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><input type="range" min="'+pr.min+'" max="'+pr.max+'" step="'+pr.step+'" value="'+v+'" oninput="setVal(\''+pr.id+'\',parseFloat(this.value));this.nextElementSibling.textContent=(('+fmtStr+')(parseFloat(this.value)))"><span class="rv">'+fmt(v)+'</span></div></div>';
    }else if(pr.type==='select'){
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><select class="sl" onchange="setVal(\''+pr.id+'\',this.value)">'+pr.options.map(o=>'<option value="'+(o.v||o.l)+'"'+(S[pr.id]===(o.v||o.l)?' selected':'')+'>'+(o.l||o.v)+'</option>').join('')+'</select></div></div>';
    }else if(pr.type==='toggle'){
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><button class="btn '+(S[pr.id]!==false?'bg':'br')+' bs" onclick="setVal(\''+pr.id+'\','+(S[pr.id]===false)+')">'+(S[pr.id]!==false?'✓':'✗')+' '+pr.lb+'</button></div></div>';
    }
  });
  p.innerHTML=h;
}

}
function speakWord(text,lang){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='fr'?'fr-FR':'ar-SA';
  u.rate=parseFloat(document.getElementById('ttsRate')?.value||0.85);
  u.pitch=parseFloat(document.getElementById('ttsPitch')?.value||0.7);
  if(lang==='fr'&&ttsFRVoice)u.voice=ttsFRVoice;
  if(lang==='ar'&&ttsARVoice)u.voice=ttsARVoice;
  speechSynthesis.speak(u);
}

// DOWNLOAD APKG
async function downloadAPKG(){
  const di=document.getElementById('dlInfo');const ld=document.getElementById('loading');
  if(di)di.textContent='';if(ld)ld.style.display='block';
  try{
    const config={...S,deckName:document.getElementById('deckName').value};
    const resp=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(config)});
    if(!resp.ok)throw new Error('Server error: '+resp.status);
    const blob=await resp.blob();if(blob.size<1000)throw new Error('ملف فارغ');
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=config.deckName+'.apkg';a.click();URL.revokeObjectURL(url);
    if(di)di.textContent='تم التنزيل ('+Math.round(blob.size/1024)+' KB)';
  }catch(e){if(di)di.textContent='خطأ: '+e.message;}finally{if(ld)ld.style.display='none';}
}
