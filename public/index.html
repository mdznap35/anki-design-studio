<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki Design Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@400;700;900&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&family=Amiri:wght@400;700&family=Montserrat:wght@400;600;700;800&family=Roboto:wght@400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--s1:#1a1a2e;--s2:#252540;--s3:#353555;--bd:#2a2a45;--tx:#e8e8f0;--tx2:#8888aa;--tx3:#555577;--ac:#7c3aed;--ac2:#a78bfa;--gn:#22c55e;--rd:#ef4444;--r:12px}
body{font-family:'Inter','Noto Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.hdr{text-align:center;padding:20px 16px 4px}
.hdr h1{font-size:1.6em;font-weight:900;background:linear-gradient(135deg,#a78bfa,#7c3aed,#c084fc);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 4s ease infinite}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr p{color:var(--tx2);font-size:.72em;margin-top:2px}
.tabs{display:flex;justify-content:center;gap:2px;margin:8px auto 12px;background:var(--s1);border-radius:10px;padding:3px;width:fit-content;border:1px solid var(--bd);flex-wrap:wrap}
.tab{padding:6px 12px;border:none;background:none;color:var(--tx2);border-radius:8px;cursor:pointer;font-size:.72em;font-weight:600;transition:all .2s;font-family:inherit}
.tab:hover{color:var(--tx);background:var(--s2)}.tab.on{color:#fff;background:var(--ac)}
.sec{display:none;padding:0 12px 30px;max-width:1400px;margin:0 auto}.sec.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.gc{background:var(--s1);border:2px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .25s;overflow:hidden;position:relative}
.gc:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 6px 20px rgba(124,58,237,.15)}
.gc.sel{border-color:var(--gn);box-shadow:0 0 16px rgba(34,197,94,.2)}
.gc.sel::after{content:'\2713';position:absolute;top:5px;left:5px;background:var(--gn);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;z-index:5}
.gp{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;overflow:hidden}
.gnm{padding:5px 8px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.gnm span{font-weight:700;font-size:.68em}.gc-cat{font-size:.48em;padding:2px 5px;border-radius:4px;background:var(--s2);color:var(--tx2)}
.filt{display:flex;justify-content:center;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.fb{padding:3px 9px;border:1px solid var(--bd);border-radius:10px;background:var(--s1);color:var(--tx2);font-size:.62em;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.fb:hover{border-color:var(--ac);color:var(--ac2)}.fb.on{border-color:var(--ac);background:rgba(124,58,237,.12);color:var(--ac2)}
.cl{display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start}
.cs{max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
.cs::-webkit-scrollbar{width:3px}.cs::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.cp{position:sticky;top:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.cp-t{font-size:.8em;font-weight:800;color:var(--ac2);text-align:center}
.cp-c{width:100%;max-width:360px;border-radius:var(--r);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--bd);background:var(--s1)}
@media(max-width:800px){.cl{grid-template-columns:1fr}.cp{position:static}}
.cw{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:8px}
.acc{margin:4px 0;border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:var(--s1)}
.acc-h{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;cursor:pointer;font-size:.72em;font-weight:800;color:var(--ac2);background:var(--s1);transition:all .2s;user-select:none}
.acc-h:hover{background:var(--s2)}
.acc-h .arr{font-size:.6em;transition:transform .2s;color:var(--tx2)}
.acc-h.open .arr{transform:rotate(90deg)}
.acc-b{display:none;padding:6px 10px 10px;background:var(--s1);border-top:1px solid var(--bd)}
.acc-b.open{display:block;animation:accOpen .2s ease}
@keyframes accOpen{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.acc-grp{margin:4px 0;padding:6px 8px;background:var(--s2);border-radius:6px}
.acc-grp-t{font-size:.62em;font-weight:700;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.ct{display:flex;flex-direction:column;gap:2px;padding:4px 0}
.cl-b{font-size:.6em;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px}
.rw{display:flex;align-items:center;gap:5px}
.rv{font-size:.62em;color:var(--ac2);min-width:30px;text-align:center;font-weight:600}
input[type=range]{flex:1;accent-color:var(--ac);height:3px}
input[type=color]{width:28px;height:24px;border:1px solid var(--bd);border-radius:5px;cursor:pointer;background:none;padding:1px}
.tx,.sl,.hx{padding:4px 7px;border:1px solid var(--bd);border-radius:5px;background:var(--s2);color:var(--tx);font-size:.7em;font-family:inherit;width:100%}
select.sl{appearance:none;cursor:pointer}
.si{display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--s2);border-radius:5px;margin-bottom:3px;font-size:.68em;cursor:grab;border:1px solid transparent;transition:all .2s}
.si:hover{border-color:var(--ac)}
.si-n{background:var(--ac);color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55em;font-weight:700}
.btn{padding:6px 12px;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:.72em;font-family:inherit;transition:all .2s}
.ba{background:linear-gradient(135deg,var(--ac),#6d28d9);color:#fff}
.bo{border:1px solid var(--bd);background:none;color:var(--tx2)}.bo:hover{border-color:var(--ac);color:var(--tx)}
.br{border:1px solid var(--rd);background:none;color:var(--rd)}
.bg{border:1px solid var(--gn);background:none;color:var(--gn)}
.bs{padding:3px 8px;font-size:.64em;border-radius:5px}
.ve-l{display:grid;grid-template-columns:1fr 220px;gap:10px;align-items:start}
.ve-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px}
.ve-p{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px}
@media(max-width:800px){.ve-l{grid-template-columns:1fr}}
.dl-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;max-width:450px;margin:0 auto}
.dl-c h3{font-size:.85em;font-weight:800;color:var(--ac2);margin-bottom:6px}
.tt-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;max-width:500px;margin:0 auto}
.tt-c h3{font-size:.82em;font-weight:800;color:var(--ac2);margin-bottom:6px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gn);color:#fff;padding:7px 16px;border-radius:8px;font-weight:700;font-size:.74em;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-3px)}
.sw{width:32px;height:32px;border-radius:6px;border:2px solid var(--bd);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.sw:hover{transform:scale(1.1);border-color:var(--ac)}
.fsw{position:relative;display:flex;justify-content:center;align-items:center;min-height:400px;background:var(--s1);border-radius:var(--r);overflow:hidden}
.fsc{max-width:380px;width:88%}
.fsn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--ac);color:#fff;border:none;cursor:pointer;font-size:.9em;display:flex;align-items:center;justify-content:center;z-index:5}
.fsn:hover{background:var(--ac2)}
.fsn.p{right:8px}.fsn.n{left:8px}
.fsi{text-align:center;padding:8px;font-size:.7em;color:var(--tx2);font-weight:600}
.fsc2{text-align:center;font-size:.62em;color:var(--tx3);padding:3px}

/* VE element selection */
[data-ve]{cursor:pointer;border:2px dashed transparent;border-radius:5px;transition:all .15s}
[data-ve]:hover{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.03)}
[data-ve].ve-sel{border-color:var(--gn)!important;border-style:solid!important;background:rgba(34,197,94,.05)!important}
@keyframes french-fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes french-slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes french-slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes french-slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes french-scaleUp{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes french-bounce{0%{transform:scale(0.3)}50%{transform:scale(1.05)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes french-glow{0%{text-shadow:0 0 5px currentColor}50%{text-shadow:0 0 20px currentColor}100%{text-shadow:0 0 5px currentColor}}
@keyframes french-typewriter{from{width:0}to{width:100%}}
@keyframes meaning-fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes meaning-slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes meaning-slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes meaning-slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes meaning-scaleUp{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes meaning-bounce{0%{transform:scale(0.3)}50%{transform:scale(1.05)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes meaning-pop{0%{transform:scale(0);border-radius:50%}100%{transform:scale(1);border-radius:16px}}
@keyframes badge-fadeIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes badge-bounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes badge-slideDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
@keyframes badge-wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes sec-fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes sec-slideUp{from{opacity:0}to{opacity:1}}
@keyframes sec-scaleUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounce{0%{transform:scale(0.3)}50%{transform:scale(1.08)}70%{transform:scale(0.92)}100%{transform:scale(1)}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.15)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes bounceOut{0%{transform:scale(1)}50%{transform:scale(1.1)}70%{transform:scale(0.95)}100%{transform:scale(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 5px currentColor}50%{text-shadow:0 0 25px currentColor,0 0 50px currentColor}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes pulseScale{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-8px)}20%{transform:translateX(8px)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}90%{transform:translateX(-1px)}}
@keyframes wobble{0%,100%{transform:rotate(0)}15%{transform:rotate(-5deg)}30%{transform:rotate(4deg)}45%{transform:rotate(-3deg)}60%{transform:rotate(2deg)}75%{transform:rotate(-1deg)}}
@keyframes swing{20%{transform:rotate(15deg)}40%{transform:rotate(-10deg)}60%{transform:rotate(5deg)}80%{transform:rotate(-5deg)}100%{transform:rotate(0)}}
@keyframes rubberBand{0%{transform:scale(1)}30%{transform:scaleX(1.25) scaleY(0.75)}40%{transform:scaleX(0.75) scaleY(1.25)}50%{transform:scaleX(1.15) scaleY(0.85)}65%{transform:scaleX(0.95) scaleY(1.05)}75%{transform:scaleX(1.05) scaleY(0.95)}100%{transform:scale(1)}}
@keyframes flip{0%{transform:perspective(400px) rotateY(0)}40%{transform:perspective(400px) rotateY(-180deg)}70%{transform:perspective(400px) rotateY(-180deg)}100%{transform:perspective(400px) rotateY(0)}}
@keyframes rotateIn{from{opacity:0;transform:rotate(-200deg) scale(0.5)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes zoomIn{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
@keyframes zoomOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.3)}}
@keyframes flash{0%,50%,100%{opacity:1}25%,75%{opacity:0}}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.15)}70%{transform:scale(1)}}
@keyframes jackInTheBox{0%{opacity:0;transform:scale(0.1) rotate(-30deg)}50%{transform:scale(1.05) rotate(-10deg)}70%{transform:scale(0.95) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes rollIn{from{opacity:0;transform:translateX(-100%) rotate(-120deg)}to{opacity:1;transform:translateX(0) rotate(0)}}
@keyframes lightSpeedIn{from{opacity:0;transform:translateX(100%) skewX(-30deg)}60%{opacity:1;transform:translateX(-20px) skewX(8deg)}80%{transform:translateX(-5px) skewX(-4deg)}to{transform:translateX(0) skewX(0)}}
@keyframes hinge{0%{transform-origin:top left;animation-timing-function:ease-in-out}20%,60%{transform:rotate(-80deg);transform-origin:top left}40%,80%{transform:rotate(60deg);transform-origin:top left;opacity:1}100%{transform:translateY(700px);opacity:0}}
@keyframes bounceUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(1deg)}75%{transform:translateY(4px) rotate(-1deg)}}
@keyframes typewriter{from{max-width:0}to{max-width:100%}}
@keyframes colorCycle{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(124,58,237,0.4)}100%{box-shadow:0 0 0 20px rgba(124,58,237,0)}}
@keyframes neonFlicker{0%,19%,21%,23%,25%,54%,56%,100%{text-shadow:0 0 7px currentColor,0 0 10px currentColor,0 0 21px currentColor}20%,24%,55%{text-shadow:none}}
@keyframes bounceInLeft{0%{opacity:0;transform:translateX(-100px)}60%{opacity:1;transform:translateX(10px)}100%{transform:translateX(0)}}
@keyframes bounceInRight{0%{opacity:0;transform:translateX(100px)}60%{opacity:1;transform:translateX(-10px)}100%{transform:translateX(0)}}
@keyframes zoomBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes rotateBounce{0%{transform:rotate(-10deg) scale(0.8);opacity:0}100%{transform:rotate(0) scale(1);opacity:1}}
@keyframes slideInDown{from{opacity:0;transform:translateY(-50px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes expandIn{0%{opacity:0;transform:scaleX(0)}100%{opacity:1;transform:scaleX(1)}}
@keyframes squeezeIn{0%{opacity:0;transform:scaleY(0)}100%{opacity:1;transform:scaleY(1)}}
@keyframes flipInX{0%{transform:perspective(400px) rotateX(90deg);opacity:0}100%{transform:perspective(400px) rotateX(0);opacity:1}}
@keyframes flipInY{0%{transform:perspective(400px) rotateY(90deg);opacity:0}100%{transform:perspective(400px) rotateY(0);opacity:1}}
@keyframes bounceOutUp{0%{transform:translateY(0)}100%{transform:translateY(-200%);opacity:0}}
@keyframes fadeOutUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-30px)}}
@keyframes fadeOutDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(30px)}}
@keyframes scaleDown{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.5)}}
@keyframes blurIn{from{opacity:0;filter:blur(20px)}to{opacity:1;filter:blur(0)}}
@keyframes dropIn{0%{opacity:0;transform:translateY(-100px) rotate(10deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
@keyframes blink{0%,50%,100%{opacity:1}25%,75%{opacity:0}}
@keyframes colorShift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 5px currentColor}50%{box-shadow:0 0 30px currentColor,0 0 60px currentColor}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

</style>
</head>
<body>
<div class="hdr"><h1>Anki Design Studio</h1><p>صمّم بطاقاتك بأسلوبك</p></div>
<div class="tabs">
<button class="tab on" data-t="gal">المعرض</button>
<button class="tab" data-t="ctl">التحكم</button>
<button class="tab" data-t="editor">المحرر البصري</button>
<button class="tab" data-t="full">معاينة كاملة</button>
<button class="tab" data-t="tts">النطق</button>
<button class="tab" data-t="dl">التنزيل</button>
</div>

<div id="sec-gal" class="sec on"><div class="filt" id="filtBar"></div><div class="gal-grid" id="tplGrid"></div></div>

<div id="sec-ctl" class="sec">
<div class="cl">
<div class="cs">
<div style="display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap">
<button class="btn bo bs" onclick="undo()" id="undoBtn" disabled>↩ تراجع</button>
<button class="btn bo bs" onclick="redo()" id="redoBtn" disabled>↪ إعادة</button>
<button class="btn bo bs" onclick="randomDesign()">🎲 عشوائي</button>
<button class="btn bo bs" onclick="resetDesign()">🔄 ضبط</button>
<button class="btn bo bs" onclick="saveCustom()">💾 حفظ</button>
</div>
<div id="ctrlArea" class="cw"></div>
</div>
<div class="cp"><div class="cp-t">معاينة مباشرة</div><div class="cp-c" id="ctlPreviewCard"></div></div>
</div>
</div>

<div id="sec-editor" class="sec">
<div class="ve-l">
<div class="ve-c" id="veCanvas"></div>
<div class="ve-p" id="veProps">
<div style="font-size:.72em;font-weight:800;color:var(--ac2);margin-bottom:6px">خصائص العنصر</div>
<div id="vePropPanel" style="font-size:.65em;color:var(--tx2)">اضغط على عنصر بالبطاقة</div>
</div>
</div>
</div>

<div id="sec-full" class="sec">
<div class="fsw">
<button class="fsn p" onclick="prevTpl()">&#9654;</button>
<button class="fsn n" onclick="nextTpl()">&#9664;</button>
<div class="fsc" id="fsCard"></div>
</div>
<div class="fsi" id="fsInfo"></div>
<div class="fsc2" id="fsCounter"></div>
</div>

<div id="sec-tts" class="sec">
<div class="tt-c">
<h3>النطق</h3>
<p style="font-size:.68em;color:var(--tx2);margin-bottom:8px">صوت رجل — يُسمع تلقائياً عند فتح البطاقة</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
<div style="display:flex;flex-direction:column;gap:2px">
<span style="font-size:.6em;color:var(--tx2)">السرعة</span>
<div class="rw"><input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="0.8"><span class="rv" id="ttsRateVal">0.8x</span></div>
</div>
<div style="display:flex;flex-direction:column;gap:2px">
<span style="font-size:.6em;color:var(--tx2)">النغمة</span>

// STATE
let S={...defCfg()};let hist=[JSON.parse(JSON.stringify(S))];let histIdx=0;let curTplIdx=0;let curCat='all';let selectedVEEl=null;
function pushHist(){hist=hist.slice(0,histIdx+1);hist.push(JSON.parse(JSON.stringify(S)));histIdx=hist.length-1;updateUndoRedo();}
function undo(){if(histIdx>0){histIdx--;S=JSON.parse(JSON.stringify(hist[histIdx]));renderAll();}}
function redo(){if(histIdx<hist.length-1){histIdx++;S=JSON.parse(JSON.stringify(hist[histIdx]));renderAll();}}
function updateUndoRedo(){const u=document.getElementById('undoBtn');if(u)u.disabled=histIdx<=0;const r=document.getElementById('redoBtn');if(r)r.disabled=histIdx>=hist.length-1;}
function setVal(k,v){S[k]=v;pushHist();renderAll();}
function renderAll(){renderGrid();updateCtlPreview();syncToggles();syncGradAngle();syncIcons();if(document.getElementById('sec-editor').classList.contains('on'))renderVE();if(document.getElementById('sec-full').classList.contains('on'))renderFullscreen();}
function syncIcons(){document.querySelectorAll('[data-icon]').forEach(function(el){var ic=el.getAttribute('data-icon');var active=S.speakerIcon===ic;el.style.background=active?'var(--ac)':'var(--s2)';el.style.borderColor=active?'var(--gn)':'var(--bd)';el.style.boxShadow=active?'0 0 8px rgba(34,197,94,.4)':'none';});}
function syncGradAngle(){document.querySelectorAll('[data-grad]').forEach(function(el){var g=el.getAttribute('data-grad');var active=(S.bgGradientDir||'135deg')===g;el.style.borderColor=active?'var(--gn)':'var(--bd)';el.style.boxShadow=active?'0 0 8px rgba(34,197,94,.4)':'none';});}

// COLOR GENERATION
function hexToHSL(hex){var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{var d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};}
function hslToHex(h,s,l){s/=100;l/=100;var a=s*Math.min(l,1-l);function f(n){var k=(n+h/30)%12;var c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');}return '#'+f(0)+f(8)+f(4);}
var _lastPalette=[];
function generateColorPalette(){var base=S.cardBg||'#7c3aed';var hsl=hexToHSL(base);var p=[];for(var i=0;i<6;i++){var h=(hsl.h+i*60)%360;p.push(hslToHex(h,Math.max(40,hsl.s),Math.max(25,Math.min(75,hsl.l+(i%2?10:-10)))));}_lastPalette=p;var el=document.getElementById('colorGenPalette');if(el)el.innerHTML=p.map(function(c){return '<div style="width:28px;height:28px;border-radius:6px;background:'+c+';cursor:pointer;border:2px solid var(--bd)" onclick="setVal('+"'"+'cardBg'+"'"+',\''+c+'\')" title="'+c+'"></div>';}).join('');}
function applyPaletteToCard(){if(_lastPalette.length>=4){S.cardBg=_lastPalette[0];S.frenchColor=_lastPalette[1];S.meaningColor=_lastPalette[2];S.meaningBg=_lastPalette[3]+'22';S.meaningBorder=_lastPalette[3];S.badgeNomBg=_lastPalette[4]+'22';S.badgeNomColor=_lastPalette[4];pushHist();renderCtrls();renderAll();toast('تم تطبيق اللوحة');}}
function generateFromBase(){var pick=document.getElementById('baseColorPicker');var base=pick?pick.value:'#7c3aed';var hsl=hexToHSL(base);var p=[base];for(var i=1;i<6;i++){var h=(hsl.h+i*30)%360;p.push(hslToHex(h,Math.min(100,hsl.s+10),Math.min(90,hsl.l+i*8)));}var el=document.getElementById('basePalette');if(el)el.innerHTML=p.map(function(c,i){var k=i===0?'cardBg':i===1?'frenchColor':i===2?'meaningColor':i===3?'meaningBg':i===4?'badgeNomBg':'secBg';return '<div style="width:24px;height:24px;border-radius:5px;background:'+c+';cursor:pointer;border:2px solid var(--bd)" onclick="setVal(\''+k+'\',\''+c+'\')" title="'+c+'"></div>';}).join('');}
function applyHarmony(type){var base=S.cardBg||'#7c3aed';var hsl=hexToHSL(base);var h=hsl.h,s=hsl.s,l=hsl.l;var harmonies={complementary:[(h+180)%360],analogous:[(h+30)%360,(h+60)%360],triadic:[(h+120)%360,(h+240)%360],'split-complementary':[(h+150)%360,(h+210)%360],tetradic:[(h+90)%360,(h+180)%360,(h+270)%360]};var cols=harmonies[type]||[];cols.unshift(h);var map=['cardBg','frenchColor','meaningColor','badgeNomBg','secBg'];cols.forEach(function(hue,i){if(i<map.length)S[map[i]]=hslToHex(hue,s,l);});pushHist();renderCtrls();renderAll();toast('تم تطبيق التناغم');}

function moveElement(dir,el){
  var order=S.elementOrder||['badge','french','separator','meaning','sections','page'];
  var idx=order.indexOf(dir);
  if(idx<0)return;
  var ni=idx+el;
  if(ni<0||ni>=order.length)return;
  var t=order[idx];order[idx]=order[ni];order[ni]=t;
  S.elementOrder=order;pushHist();renderCtrls();renderAll();
}

  var tr='';if(rot)tr+='rotate('+rot+'deg) ';if(skx||sky)tr+='skew('+skx+'deg,'+sky+'deg) ';if(tx||ty)tr+='translate('+tx+'px,'+ty+'px) ';if(sc!==1)tr+='scale('+sc+') ';
  if(tr)s+='transform:'+tr.trim()+';';

  if(fl)s+='filter:'+fl.trim()+';';
  // Box shadow
  var bsx=c[p+'BoxShadowX']||0,bsy=c[p+'BoxShadowY']||0,bsb=c[p+'BoxShadowBlur']||0,bss=c[p+'BoxShadowSpread']||0;
  if(bsx||bsy||bsb||bss)s+='box-shadow:'+bsx+'px '+bsy+'px '+bsb+'px '+bss+'px '+(c[p+'BoxShadowColor']||'rgba(0,0,0,.1)')+';';

  if(c[p+'Transition'])s+='transition:'+c[p+'Transition']+';';

  var pos=c[p+'Position']||'static';
  if(pos!=='static'){s+='position:'+pos+';';var t=c[p+'Top'],l=c[p+'Left'],r=c[p+'Right'],b=c[p+'Bottom'];if(t||t===0)s+='top:'+t+'px;';if(l||l===0)s+='left:'+l+'px;';if(r||r===0)s+='right:'+r+'px;';if(b||b===0)s+='bottom:'+b+'px;';}

  if(c[p+'MixBlendMode']&&c[p+'MixBlendMode']!=='normal')s+='mix-blend-mode:'+c[p+'MixBlendMode']+';';
  return s;
}

// TEMPLATE MANAGEMENT
function saveCustom(){const n=prompt('اسم القالب:');if(!n)return;const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');s.push({name:n,cfg:{...S},date:Date.now()});localStorage.setItem('anki_custom',JSON.stringify(s));toast('تم الحفظ: '+n);renderSavedList();}
function loadCustom(i){const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');if(!s[i])return;S={...s[i].cfg};pushHist();renderAll();toast(s[i].name);}
function deleteCustom(i){const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');s.splice(i,1);localStorage.setItem('anki_custom',JSON.stringify(s));renderSavedList();toast('تم الحذف');}
function renderSavedList(){const s=JSON.parse(localStorage.getItem('anki_custom')||'[]');const e=document.getElementById('savedTplList');if(!e)return;if(!s.length){e.innerHTML='<div style="font-size:.65em;color:var(--tx3)">لا يوجد</div>';return;}e.innerHTML=s.map((x,i)=>'<div style="display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--s2);border-radius:5px;margin-bottom:3px;font-size:.68em"><span style="flex:1;font-weight:600">'+x.name+'</span><button class="btn bo bs" onclick="loadCustom('+i+')">تحميل</button><button class="btn br bs" onclick="deleteCustom('+i+')">حذف</button></div>').join('');}

// EXPORT / IMPORT
function exportConfig(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='anki-design.json';a.click();toast('تم التصدير');}
function importConfig(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(typeof d!=='object'||d===null){toast('ملف غير صحيح');return;}const validKeys=['cardBg','frenchColor','meaningColor','borderRadius','cardPadding','fontFrench','fontArabic','effect','deckName'];if(!validKeys.some(function(k){return k in d;})){toast('ملف غير صالح');return;}S=Object.assign({},defCfg(),d);pushHist();renderCtrls();renderAll();toast('تم الاستيراد');}catch(err){toast('ملف غير صحيح');}};r.readAsText(f);}

// FULLSCREEN PREVIEW
function renderFullscreen(){const t=getFilteredTemplates()[curTplIdx]||TEMPLATES[0];const c=document.getElementById('fsCard');const i=document.getElementById('fsInfo');const n=document.getElementById('fsCounter');if(c)c.innerHTML=renderCardHTML(t.cfg);if(i)i.textContent=t.nm+' — '+t.en;if(n)n.textContent=(curTplIdx+1)+' / '+getFilteredTemplates().length;}
function nextTpl(){const t=getFilteredTemplates();curTplIdx=(curTplIdx+1)%t.length;renderFullscreen();}
function prevTpl(){const t=getFilteredTemplates();curTplIdx=(curTplIdx-1+t.length)%t.length;renderFullscreen();}

// BACKGROUND IMAGE UPLOAD
function uploadBG(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){if(ev.target.result.length>600000){toast('الصورة كبيرة جداً (الحد 500KB)');return;}S.cardBgImage=ev.target.result;pushHist();renderAll();toast('تم تحميل الصورة');};
  reader.readAsDataURL(file);
}

function renderVE(){
  const cv=document.getElementById('veCanvas');if(!cv)return;
  cv.innerHTML=renderCardHTML(S);
  const card=cv.querySelector('.card');if(!card)return;
  // Click on card = select card
  card.addEventListener('click',(e)=>{
    if(e.target.closest('[data-ve]')&&e.target.closest('[data-ve]')!==card)return;
    card.querySelectorAll('.ve-sel').forEach(el=>el.classList.remove('ve-sel'));
    card.classList.add('ve-sel');
    selectedVEEl='card';renderVEProps('card');
  });
  // Click on any [data-ve] element
  card.querySelectorAll('[data-ve]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      card.querySelectorAll('.ve-sel').forEach(x=>x.classList.remove('ve-sel'));
      el.classList.add('ve-sel');
      const veId=el.dataset.ve;
      selectedVEEl=veId;renderVEProps(veId);
    });
  });
}

      const fmt=pr.fmt||(vv=>vv);
      const fmtStr=pr.fmt?pr.fmt.toString():'(x=>x)';
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><input type="range" min="'+pr.min+'" max="'+pr.max+'" step="'+pr.step+'" value="'+v+'" oninput="setVal(\''+pr.id+'\',parseFloat(this.value));this.nextElementSibling.textContent=(('+fmtStr+')(parseFloat(this.value)))"><span class="rv">'+fmt(v)+'</span></div></div>';
    }else if(pr.type==='select'){
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><select class="sl" onchange="setVal(\''+pr.id+'\',this.value)">'+pr.options.map(o=>'<option value="'+(o.v||o.l)+'"'+(S[pr.id]===(o.v||o.l)?' selected':'')+'>'+(o.l||o.v)+'</option>').join('')+'</select></div></div>';
    }else if(pr.type==='toggle'){
      h+='<div class="ct"><div class="cl-b">'+pr.lb+'</div><div class="rw"><button class="btn '+(S[pr.id]!==false?'bg':'br')+' bs" onclick="setVal(\''+pr.id+'\','+(S[pr.id]===false)+')">'+(S[pr.id]!==false?'✓':'✗')+' '+pr.lb+'</button></div></div>';
    }
  });
  p.innerHTML=h;
}

// TTS - Male Voice Only
let ttsFRVoice=null,ttsARVoice=null,ttsFRManual=null,ttsARManual=null,ttsAllVoices=[];
function isMaleVoice(v){
  const n=v.name.toLowerCase();
  if(n.includes('female')||n.includes('femme')||n.includes('zira')||n.includes('samantha')||n.includes('karen')||n.includes('susan')||n.includes('moira')||n.includes('tessa')||n.includes('fiona')||n.includes('google uk english female')||n.includes('google us english female')||n.includes('google arabic female')||n.includes('google french female')||n.includes('google arabic')||n.includes('google french')||n.includes('microsoft zira'))return false;
  if(n.includes('male')||n.includes('homme')||n.includes('thomas')||n.includes('nicolas')||n.includes('lucas')||n.includes('hugo')||n.includes('antoine')||n.includes('pierre')||n.includes('jacques')||n.includes('michel')||n.includes('paul')||n.includes('henri')||n.includes('daniel')||n.includes('eric')||n.includes('enhanced')||n.includes('maturity'))return true;
  // For unknown gender, prefer non-female names
  return false;
}
function initTTS(){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const voices=speechSynthesis.getVoices();
  if(!voices.length)return;
  ttsAllVoices=voices;
  // Populate voice selectors
  const frSel=document.getElementById('frVoiceSelect');
  const arSel=document.getElementById('arVoiceSelect');
  const frV=voices.filter(v=>v.lang.startsWith('fr'));
  const arV=voices.filter(v=>v.lang.startsWith('ar'));
  // Sort: male first
  frV.sort((a,b)=>(isMaleVoice(b)?1:0)-(isMaleVoice(a)?1:0));
  arV.sort((a,b)=>(isMaleVoice(b)?1:0)-(isMaleVoice(a)?1:0));
  if(frSel){frSel.innerHTML='<option value="">تلقائي ('+(frV.find(isMaleVoice)?.name||frV[0]?.name||'لا يوجد')+')</option>'+frV.map(v=>'<option value="'+v.name+'">'+(isMaleVoice(v)?'♂ ':'♀ ')+v.name+' ['+v.lang+']</option>').join('');}
  if(arSel){arSel.innerHTML='<option value="">تلقائي ('+(arV.find(isMaleVoice)?.name||arV[0]?.name||'لا يوجد')+')</option>'+arV.map(v=>'<option value="'+v.name+'">'+(isMaleVoice(v)?'♂ ':'♀ ')+v.name+' ['+v.lang+']</option>').join('');}
  // Auto-select male voices
  ttsFRVoice=frV.find(isMaleVoice)||frV[0]||null;
  ttsARVoice=arV.find(isMaleVoice)||arV[0]||null;
  // Debug
  const dbg=document.getElementById('ttsDebug');
  if(dbg)dbg.innerHTML='<b>صوت فرنسي:</b> '+(ttsFRVoice?.name||'لا يوجد')+'<br><b>صوت عربي:</b> '+(ttsARVoice?.name||'لا يوجد')+'<br><b>إجمالي:</b> '+voices.length+' صوت';
  console.log('TTS voices:',ttsFRVoice?.name,ttsARVoice?.name);
  const rateEl=document.getElementById('ttsRate');
  const pitchEl=document.getElementById('ttsPitch');
  if(rateEl)rateEl.oninput=function(){document.getElementById('ttsRateVal').textContent=this.value+'x';};
  if(pitchEl)pitchEl.oninput=function(){document.getElementById('ttsPitchVal').textContent=parseFloat(this.value).toFixed(1);};
}
function selectVoice(lang,name){
  if(!name){if(lang==='fr')ttsFRManual=null;else ttsARManual=null;return;}
  const v=ttsAllVoices.find(x=>x.name===name);
  if(!v){console.warn('Voice not found:',name);return;}
  if(lang==='fr')ttsFRManual=v;else ttsARManual=v;
}
function speakWord(text,lang){
  if(!window.speechSynthesis){return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='fr'?'fr-FR':'ar-SA';
  var rate=parseFloat(document.getElementById('ttsRate')?document.getElementById('ttsRate').value:0.8);
  var pitch=parseFloat(document.getElementById('ttsPitch')?document.getElementById('ttsPitch').value:0.5);
  u.rate=rate;
  u.pitch=pitch;
  // Find a male voice for this language
  var voices=speechSynthesis.getVoices();
  var langPrefix=lang==='fr'?'fr':'ar';
  var candidates=voices.filter(function(v){return v.lang.indexOf(langPrefix)===0;});
  // Sort: male first
  candidates.sort(function(a,b){return (isMaleVoice(b)?1:0)-(isMaleVoice(a)?1:0);});
  // Choose voice: manual override > auto-selected > first male > first available
  var chosen=null;
  if(lang==='fr'){chosen=ttsFRManual||ttsFRVoice;}
  if(lang==='ar'){chosen=ttsARManual||ttsARVoice;}
  if(!chosen&&candidates.length>0){chosen=candidates[0];}
  if(chosen){u.voice=chosen;}
  console.log('TTS:',chosen?chosen.name:'none','lang:',u.lang,'male:',chosen?isMaleVoice(chosen):'?');
  speechSynthesis.speak(u);
}

// DOWNLOAD APKG
async function downloadAPKG(){
  const di=document.getElementById('dlInfo');const ld=document.getElementById('loading');
  if(di)di.textContent='';if(ld)ld.style.display='block';
  try{
    const config={...S,deckName:document.getElementById('deckName').value};
    const resp=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(config)});
    if(!resp.ok)throw new Error('Server error: '+resp.status);
    const blob=await resp.blob();if(blob.size<1000)throw new Error('ملف فارغ');
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=config.deckName+'.apkg';a.click();URL.revokeObjectURL(url);
    if(di)di.textContent='تم التنزيل ('+Math.round(blob.size/1024)+' KB)';
  }catch(e){if(di)di.textContent='خطأ: '+e.message;}finally{if(ld)ld.style.display='none';}
}

});
